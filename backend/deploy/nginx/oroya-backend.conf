# Nginx reverse proxy example for the Oroya backend.
#
# - TLS termination via Let's Encrypt (use `certbot --nginx -d api.example.com`).
# - Backend itself listens on 127.0.0.1:4000 (BACKEND_LOCAL_ONLY=true).
# - Only the public ingress path /payments/nowpayments-webhook is reachable
#   without a local IP, exactly as configured in BACKEND_PUBLIC_INGRESS_PATHS.

upstream oroya_backend {
    server 127.0.0.1:4000;
    keepalive 16;
}

server {
    listen 80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 8m;
    client_body_buffer_size 64k;

    location / {
        proxy_pass         http://oroya_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Overwrite client-supplied forwarding headers so the backend only sees
        # the real peer IP captured by this trusted proxy.
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }
}
